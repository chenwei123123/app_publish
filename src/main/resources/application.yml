spring:
  application:
    name: app-publish-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:@env.name@}
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    banner: false

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    url: /v3/api-docs.yaml

app:
  token-refresh-ahead-seconds: 300
  review-poll-delay-ms: 60000
  review-auto-pass-seconds: 180
  jwt-auth:
    enabled: ${APP_JWT_AUTH_ENABLED:false}
    header-name: ${APP_JWT_AUTH_HEADER_NAME:Authentication}
    secret: ${APP_JWT_AUTH_SECRET:webauth2022}
    cookie-name: ${APP_JWT_AUTH_COOKIE_NAME:Authentication}
    cookie-path: ${APP_JWT_AUTH_COOKIE_PATH:/}
    cookie-http-only: ${APP_JWT_AUTH_COOKIE_HTTP_ONLY:true}
    cookie-secure: ${APP_JWT_AUTH_COOKIE_SECURE:false}
    cookie-same-site: ${APP_JWT_AUTH_COOKIE_SAME_SITE:Lax}
    audience-aes-key: ${APP_JWT_AUTH_AUDIENCE_AES_KEY:K6MIDdFi1NGk685H}
    audience-aes-iv: ${APP_JWT_AUTH_AUDIENCE_AES_IV:}
  package-repository:
    apk-url-32: ${PACKAGE_REPOSITORY_APK_URL_32:https://artifacts.cmschina.com.cn:443/artifactory/cms_app-generic-release-wx/android/%s_cmschina_armeabi_%s/cms_yht_32.apk}
    apk-url-64: ${PACKAGE_REPOSITORY_APK_URL_64:https://artifacts.cmschina.com.cn:443/artifactory/cms_app-generic-release-wx/android/%s_cmschina_arm64_%s/cms_yht_64.apk}
    app-url: ${PACKAGE_REPOSITORY_APP_URL:https://artifacts.cmschina.com.cn:443/artifactory/INT_CMSAPP_HARMONY-generic-release-wx/harmony/%s_%s/CMSApp_HM-yht_release-signed.app}
    base-url: ${PACKAGE_REPOSITORY_BASE_URL:}
    stream-upload-enabled: ${PACKAGE_REPOSITORY_STREAM_UPLOAD_ENABLED:false}
    authorization: ${PACKAGE_REPOSITORY_AUTHORIZATION:Basic eHVjaGFvNjpBS0NwOGpSN0U5G9LZjZzMWY1N1pGcG9Za2F5SHpqSE52bkRUZWhpY2NZWDDwOUZyNG1YeTJuaHgyV3dmQkdtZ1JoWWdWZXVG}
    download-timeout-seconds: ${PACKAGE_REPOSITORY_DOWNLOAD_TIMEOUT_SECONDS:300}
  publish-metadata:
    base-dir: ${APP_PUBLISH_METADATA_BASE_DIR:.}
    values:
      versionName: "1.0.0"
      versionCode: 100
      reinforced: false
      #yingyongbao:
        #appId: "312312312412"
      #xiaomi:
        #privacyUrl: ""
        #iconPath: ""
      vivo:
        #appClassify: "9"
        #subAppClassify: "3"
        #rateAge: 18
        compatibleDevice: 2
        #iconPath: "icon.png"
        #screenshotPaths:
          #- "screen1.png"
          #- "screen2.png"
          #- "screen3.png"
        apk32Path: "D:\\下载\\cms_yht_32.apk"
        apk64Path: "D:\\下载\\cms_yht_64.apk"
  store-api:
    default-timeout-seconds: 15

logging:
  file:
    path: ${LOG_PATH:logs}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 30
      total-size-cap: 2GB
