server:
  port: ${SERVER_PORT:8090}

spring:
  datasource:
    url: ${DB_URL:jdbc:oceanbase://172.253.168.48:2883/app_pub?useUnicode=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&autoReconnect=true&useSSL=false&allowMultiQueries=true}
    username: ${DB_USERNAME:starlink@starlink}
    password: ${DB_PASSWORD:starlink}
    driver-class-name: com.oceanbase.jdbc.Driver

app:
  storage-root: ${APP_STORAGE_ROOT:storage/sit}
  package-repository:
    stream-upload-enabled: ${PACKAGE_REPOSITORY_STREAM_UPLOAD_ENABLED:false}
  store-api:
    stores:
      huawei:
        mock-enabled: ${STORE_HUAWEI_MOCK_ENABLED:false}
      xiaomi:
        mock-enabled: ${STORE_XIAOMI_MOCK_ENABLED:false}
      oppo:
        mock-enabled: ${STORE_OPPO_MOCK_ENABLED:false}
      vivo:
        # vivo 默认使用测试环境地址，可通过 STORE_VIVO_SANDBOX_ENABLED 覆盖
        mock-enabled: ${STORE_VIVO_MOCK_ENABLED:false}
        sandbox-enabled: ${STORE_VIVO_SANDBOX_ENABLED:false}
      yingyongbao:
        mock-enabled: ${STORE_YINGYONGBAO_MOCK_ENABLED:false}
      sanxing:
        mock-enabled: ${STORE_SANXING_MOCK_ENABLED:false}
      rongyao:
        mock-enabled: ${STORE_RONGYAO_MOCK_ENABLED:false}

logging:
  level:
    root: INFO
    com.app.publishservice: INFO
    com.app.publishservice.repository: ${MYBATIS_SQL_LOG_LEVEL:DEBUG}
    org.apache.ibatis: ${MYBATIS_SQL_LOG_LEVEL:DEBUG}
