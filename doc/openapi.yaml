openapi: 3.0.3
info:
  title: 应用发布服务 API
  version: 1.0.0
  description: 应用发布服务当前对外接口定义，字段说明已按最新代码结构更新，并补充中文注释。
servers:
  - url: /
    description: 当前访问地址
tags:
  - name: 应用管理
    description: 应用基础信息的新增、修改、查询和删除接口
  - name: 应用商店账号配置
    description: 应用商店账号配置的新增、修改、查询和状态维护接口
  - name: 安装包管理
    description: 安装包上传、版本解析和版本查询接口
  - name: 发布管理
    description: 发版提交与发版记录查询接口
  - name: CI/CD 发布
    description: CI/CD 场景下一键上传并触发发布的接口
paths:
  /api/apps:
    post:
      tags: [应用管理]
      summary: 创建应用
      description: 创建应用基础信息。
      requestBody:
        required: true
        description: 应用新增请求体
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppUpsertRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppResponse'
    get:
      tags: [应用管理]
      summary: 查询应用列表
      description: 按应用名称、应用描述或包名关键字筛选应用。
      parameters:
        - in: query
          name: keyword
          required: false
          description: 关键字，支持按应用名称、应用描述或包名模糊匹配
          schema:
            type: string
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppResponseList'
  /api/apps/{appId}:
    get:
      tags: [应用管理]
      summary: 查询应用详情
      description: 根据应用 ID 查询应用详情、关联版本和关联发版记录。
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppDetailResponse'
    put:
      tags: [应用管理]
      summary: 更新应用
      description: 根据应用 ID 更新应用基础信息。
      parameters:
        - $ref: '#/components/parameters/AppId'
      requestBody:
        required: true
        description: 应用更新请求体
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppUpsertRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppResponse'
    delete:
      tags: [应用管理]
      summary: 删除应用
      description: 删除应用及其关联的版本、发版记录等数据。
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
  /api/store-configs:
    get:
      tags: [应用商店账号配置]
      summary: 查询应用商店账号列表
      description: 分页查询应用商店账号配置。
      parameters:
        - in: query
          name: current
          required: false
          description: 当前页，兼容 `pageNum`
          schema:
            type: integer
            format: int64
        - in: query
          name: size
          required: false
          description: 每页大小，兼容 `pageSize`
          schema:
            type: integer
            format: int64
        - in: query
          name: pageNum
          required: false
          description: 当前页别名，未传 `current` 时生效
          schema:
            type: integer
            format: int64
        - in: query
          name: pageSize
          required: false
          description: 每页大小别名，未传 `size` 时生效
          schema:
            type: integer
            format: int64
        - in: query
          name: key
          required: false
          description: 关键字，支持按商店类型、账号名、邮箱、手机号、隐私地址或应用 ID 模糊匹配
          schema:
            type: string
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePageResponseStoreConfigResponse'
    post:
      tags: [应用商店账号配置]
      summary: 创建应用商店账号
      description: 创建应用商店账号配置。
      requestBody:
        required: true
        description: 应用商店账号配置请求体
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreConfigRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StoreConfigMultipartRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStoreConfigResponse'
  /api/store-configs/{configId}:
    get:
      tags: [应用商店账号配置]
      summary: 查询应用商店账号详情
      description: 根据配置 ID 查询应用商店账号配置。
      parameters:
        - $ref: '#/components/parameters/ConfigId'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStoreConfigResponse'
    put:
      tags: [应用商店账号配置]
      summary: 更新应用商店账号
      description: 根据配置 ID 更新应用商店账号配置。
      parameters:
        - $ref: '#/components/parameters/ConfigId'
      requestBody:
        required: true
        description: 应用商店账号配置更新请求体
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreConfigRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StoreConfigMultipartRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStoreConfigResponse'
    delete:
      tags: [应用商店账号配置]
      summary: 删除应用商店账号
      description: 根据配置 ID 删除应用商店账号配置。
      parameters:
        - $ref: '#/components/parameters/ConfigId'
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
  /api/store-configs/{configId}/status:
    put:
      tags: [应用商店账号配置]
      summary: 更新应用商店账号状态
      description: 启用或禁用应用商店账号配置。
      parameters:
        - $ref: '#/components/parameters/ConfigId'
        - in: query
          name: apiStatus
          required: true
          description: API 状态，`1` 表示启用，`0` 表示禁用
          schema:
            type: integer
            enum: [0, 1]
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStoreConfigResponse'
  /api/apps/{appId}/versions:
    get:
      tags: [安装包管理]
      summary: 查询版本列表
      description: 查询指定应用下的所有安装包版本。
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppVersionResponseList'
  /api/apps/{appId}/versions/{versionId}:
    get:
      tags: [安装包管理]
      summary: 查询版本详情
      description: 根据应用 ID 和版本 ID 查询安装包版本详情。
      parameters:
        - $ref: '#/components/parameters/AppId'
        - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppVersionResponse'
  /api/apps/{appId}/versions/upload:
    post:
      tags: [安装包管理]
      summary: 上传安装包
      description: 上传应用安装包并解析版本信息，可附带版本校验条件。
      parameters:
        - $ref: '#/components/parameters/AppId'
      requestBody:
        required: true
        description: 安装包上传表单
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 安装包文件
                updateLog:
                  type: string
                  description: 版本更新说明
                expectedVersionName:
                  type: string
                  description: 期望的版本名称，用于上传后校验
                expectedVersionCode:
                  type: string
                  description: 期望的版本号，用于上传后校验
                expectedReinforced:
                  type: boolean
                  description: 期望是否为加固包，用于上传后校验
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePackageUploadResponse'
  /api/releases:
    get:
      tags: [发布管理]
      summary: 查询发版记录
      description: 分页查询发版记录列表。
      parameters:
        - in: query
          name: current
          required: false
          description: 当前页，兼容 `pageNum`
          schema:
            type: integer
            format: int64
        - in: query
          name: size
          required: false
          description: 每页大小，兼容 `pageSize`
          schema:
            type: integer
            format: int64
        - in: query
          name: pageNum
          required: false
          description: 当前页别名，未传 `current` 时生效
          schema:
            type: integer
            format: int64
        - in: query
          name: pageSize
          required: false
          description: 每页大小别名，未传 `size` 时生效
          schema:
            type: integer
            format: int64
        - in: query
          name: key
          required: false
          description: 关键字，支持按商店类型、应用名称、包名、应用描述或版本号模糊匹配
          schema:
            type: string
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePageResponseReleaseRecordPageResponse'
  /api/releases/submit:
    post:
      tags: [发布管理]
      summary: 提交发版
      description: 将指定版本提交到一个或多个应用商店进行发版。
      requestBody:
        required: true
        description: 发版提交请求体
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseSubmitRequest'
      responses:
        '200':
          description: 提交成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseReleaseRecordResponseList'
  /api/releases/{releaseId}:
    get:
      tags: [发布管理]
      summary: 查询发版详情
      description: 根据发版记录 ID 查询发版详情。
      parameters:
        - $ref: '#/components/parameters/ReleaseId'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseReleaseRecordResponse'
  /api/releases/appId/{appId}:
    get:
      tags: [发布管理]
      summary: 根据应用 ID 查询发版记录
      description: 根据应用 ID 查询该应用下的发版记录列表。
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePageResponseReleaseRecordPageResponse'
  /api/cicd/releases/trigger:
    post:
      tags: [CI/CD 发布]
      summary: 触发 CI/CD 发布
      description: 上传安装包并直接触发指定渠道的发布流程。
      requestBody:
        required: true
        description: CI/CD 发布触发表单
        content:
          multipart/form-data:
            schema:
              type: object
              required: [appId, storeTypes, file]
              properties:
                appId:
                  type: integer
                  format: int64
                  description: 应用 ID
                storeTypes:
                  type: string
                  description: 发布渠道列表，多个值用英文逗号分隔，例如 `vivo,xiaomi`
                file:
                  type: string
                  format: binary
                  description: 安装包文件
                updateLog:
                  type: string
                  description: 版本更新说明
                expectedVersionName:
                  type: string
                  description: 期望的版本名称，用于上传后校验
                expectedVersionCode:
                  type: string
                  description: 期望的版本号，用于上传后校验
                expectedReinforced:
                  type: boolean
                  description: 期望是否为加固包，用于上传后校验
      responses:
        '200':
          description: 触发成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseReleaseRecordResponseList'
components:
  parameters:
    AppId:
      in: path
      name: appId
      required: true
      description: 应用 ID
      schema:
        type: integer
        format: int64
    ConfigId:
      in: path
      name: configId
      required: true
      description: 应用商店账号配置 ID
      schema:
        type: integer
        format: int64
    VersionId:
      in: path
      name: versionId
      required: true
      description: 版本 ID
      schema:
        type: integer
        format: int64
    ReleaseId:
      in: path
      name: releaseId
      required: true
      description: 发版记录 ID
      schema:
        type: integer
        format: int64
  schemas:
    AppUpsertRequest:
      type: object
      description: 应用新增或更新请求体
      required: [appName, packageName, appType]
      properties:
        id:
          type: integer
          format: int64
          description: 应用 ID，更新场景可传
        appName:
          type: string
          description: 应用名称
        packageName:
          type: string
          description: 应用包名
        appType:
          type: integer
          enum: [1, 2]
          description: 应用类型，`1` 表示 Android，`2` 表示 iOS
        appDescription:
          type: string
          description: 应用描述
        copyrightNo:
          type: string
          description: 软件著作权登记号
        icpNo:
          type: string
          description: ICP 备案号
        appRecordNo:
          type: string
          description: 应用备案号
        privacyUrl:
          type: string
          description: 隐私政策地址
        userAgreementUrl:
          type: string
          description: 用户协议地址
        status:
          type: integer
          enum: [0, 1]
          default: 1
          description: 状态，`1` 表示启用，`0` 表示禁用
        versionCode:
          type: string
          description: 版本号，创建应用时可用于初始化首个版本记录
        buildCode:
          type: string
          description: 构建号，创建应用时可用于初始化首个版本记录
    StoreConfigRequest:
      type: object
      description: 应用商店账号配置请求体
      required: [storeType]
      properties:
        id:
          type: integer
          format: int64
          description: 配置 ID，更新场景可传
        storeType:
          type: string
          description: 应用商店类型，例如 `vivo`、`oppo`、`huawei`、`xiaomi`
        accountName:
          type: string
          description: 账号名称
        email:
          type: string
          description: 联系邮箱
        phone:
          type: string
          description: 联系手机号
        clientId:
          type: string
          description: 开放平台 Client ID
        clientSecret:
          type: string
          description: 开放平台 Client Secret
        publicKey:
          type: string
          description: 平台公钥，当前主要用于小米渠道
        privateKey:
          type: string
          description: 平台私钥，当前主要用于小米渠道
        token:
          type: string
          description: 固定 Token
        ipWhitelist:
          type: string
          description: IP 白名单
        privacyUrl:
          type: string
          description: 小米隐私政策地址
        icon:
          type: string
          description: 小米图标 Base64，支持原始 Base64 或 data:image/...;base64,...
        appId:
          type: string
          description: 应用宝 appId / 三星 contentId
        apiStatus:
          type: integer
          enum: [0, 1]
          default: 1
          description: API 状态，`1` 表示启用，`0` 表示禁用
    StoreConfigMultipartRequest:
      type: object
      description: 应用商店账号配置表单请求体
      required: [storeType]
      properties:
        id:
          type: integer
          format: int64
          description: 配置 ID，更新场景可传
        storeType:
          type: string
          description: 应用商店类型，例如 `vivo`、`oppo`、`huawei`、`xiaomi`
        accountName:
          type: string
          description: 账号名称
        email:
          type: string
          description: 联系邮箱
        phone:
          type: string
          description: 联系手机号
        clientId:
          type: string
          description: 开放平台 Client ID
        clientSecret:
          type: string
          description: 开放平台 Client Secret
        publicKey:
          type: string
          description: 平台公钥，当前主要用于小米渠道
        privateKey:
          type: string
          description: 平台私钥，当前主要用于小米渠道
        token:
          type: string
          description: 固定 Token
        ipWhitelist:
          type: string
          description: IP 白名单
        privacyUrl:
          type: string
          description: 小米隐私政策地址
        icon:
          type: string
          description: 小米图标 Base64，支持原始 Base64 或 data:image/...;base64,...
        iconFile:
          type: string
          format: binary
          description: 小米图标文件，上传后自动转为 Base64 保存
        appId:
          type: string
          description: 应用宝 appId / 三星 contentId
        apiStatus:
          type: integer
          enum: [0, 1]
          default: 1
          description: API 状态，`1` 表示启用，`0` 表示禁用
    ReleaseSubmitRequest:
      type: object
      description: 发版提交请求体
      required: [versionId, storeTypes]
      properties:
        versionId:
          type: integer
          format: int64
          description: 版本 ID
        storeTypes:
          type: array
          description: 发布渠道列表，例如 `vivo`、`xiaomi`
          items:
            type: string
        releaseMode:
          type: string
          enum: [manual, api]
          default: api
          description: 发布模式，默认 `api`
        releaseType:
          type: integer
          format: int64
          default: 1
          description: 发布类型，`1` 表示全量发布，`2` 表示分阶段发布
        grayPercent:
          type: integer
          format: int64
          description: 灰度比例，仅分阶段发布时生效
        grayStartTime:
          type: string
          format: date-time
          description: 灰度开始时间，仅分阶段发布时生效
        grayEndTime:
          type: string
          format: date-time
          description: 灰度结束时间，仅分阶段发布时生效
    AppResponse:
      type: object
      description: 应用响应
      properties:
        id:
          type: integer
          format: int64
          description: 应用 ID
        appName:
          type: string
          description: 应用名称
        packageName:
          type: string
          description: 应用包名
        appType:
          type: integer
          enum: [1, 2]
          description: 应用类型，`1` 表示 Android，`2` 表示 iOS
        appDescription:
          type: string
          description: 应用描述
        copyrightNo:
          type: string
          description: 软件著作权登记号
        icpNo:
          type: string
          description: ICP 备案号
        appRecordNo:
          type: string
          description: 应用备案号
        privacyUrl:
          type: string
          description: 隐私政策地址
        userAgreementUrl:
          type: string
          description: 用户协议地址
        status:
          type: integer
          enum: [0, 1]
          description: 状态，`1` 表示启用，`0` 表示禁用
        createUser:
          type: string
          description: 创建人
        updateUser:
          type: string
          description: 更新人
        createTime:
          type: string
          format: date-time
          description: 创建时间
        updateTime:
          type: string
          format: date-time
          description: 更新时间
        versions:
          type: array
          description: 关联版本列表
          items:
            $ref: '#/components/schemas/AppVersionResponse'
        releaseRecords:
          type: array
          description: 关联发版记录列表
          items:
            $ref: '#/components/schemas/ReleaseRecordResponse'
    AppDetailResponse:
      type: object
      description: 应用详情响应
      properties:
        id:
          type: integer
          format: int64
          description: 应用 ID
        appName:
          type: string
          description: 应用名称
        packageName:
          type: string
          description: 应用包名
        appType:
          type: integer
          enum: [1, 2]
          description: 应用类型，`1` 表示 Android，`2` 表示 iOS
        appDescription:
          type: string
          description: 应用描述
        copyrightNo:
          type: string
          description: 软件著作权登记号
        icpNo:
          type: string
          description: ICP 备案号
        appRecordNo:
          type: string
          description: 应用备案号
        privacyUrl:
          type: string
          description: 隐私政策地址
        userAgreementUrl:
          type: string
          description: 用户协议地址
        status:
          type: integer
          enum: [0, 1]
          description: 状态，`1` 表示启用，`0` 表示禁用
        createUser:
          type: string
          description: 创建人
        updateUser:
          type: string
          description: 更新人
        createTime:
          type: string
          format: date-time
          description: 创建时间
        updateTime:
          type: string
          format: date-time
          description: 更新时间
        versions:
          type: array
          description: 关联版本列表
          items:
            $ref: '#/components/schemas/AppVersionResponse'
        releaseRecords:
          type: array
          description: 关联发版记录列表
