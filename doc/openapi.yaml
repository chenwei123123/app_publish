openapi: 3.0.3
info:
  title: 应用发布服务 API
  version: 1.0.0
  description: 当前应用发布服务接口的 OpenAPI 定义。
servers:
  - url: /
    description: 当前访问地址
tags:
  - name: 应用管理
  - name: 渠道配置
  - name: 安装包管理
  - name: 发版管理
  - name: CI/CD
paths:
  /api/apps:
    post:
      tags: [应用管理]
      summary: 创建应用
      requestBody:
        description: 应用请求体
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppUpsertRequest'
      responses:
        '200':
          description: 创建成功并返回应用信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppResponse'
    get:
      tags: [应用管理]
      summary: 查询应用列表
      parameters:
        - in: query
          name: keyword
          description: 按应用名称、描述或包名进行模糊匹配
          schema:
            type: string
      responses:
        '200':
          description: 查询成功并返回应用列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppResponseList'
  /api/apps/{appId}:
    get:
      tags: [应用管理]
      summary: 查询应用详情
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: 查询成功并返回应用详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppDetailResponse'
    put:
      tags: [应用管理]
      summary: 更新应用
      parameters:
        - $ref: '#/components/parameters/AppId'
      requestBody:
        description: 应用请求体
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppUpsertRequest'
      responses:
        '200':
          description: 更新成功并返回最新应用信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppResponse'
    delete:
      tags: [应用管理]
      summary: 删除应用
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
  /api/store-configs:
    get:
      tags: [渠道配置]
      summary: 查询渠道配置列表
      parameters:
        - in: query
          name: current
          description: 当前页，兼容 pageNum
          schema:
            type: integer
            format: int64
        - in: query
          name: size
          description: 每页大小，兼容 pageSize
          schema:
            type: integer
            format: int64
        - in: query
          name: pageNum
          description: 当前页别名，未传 current 时生效
          schema:
            type: integer
            format: int64
        - in: query
          name: pageSize
          description: 每页大小别名，未传 size 时生效
          schema:
            type: integer
            format: int64
        - in: query
          name: key
          description: 按渠道名称、账号名、邮箱或电话进行模糊匹配
          schema:
            type: string
      responses:
        '200':
          description: 查询成功并返回渠道配置分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePageResponseStoreConfigResponse'
    post:
      tags: [渠道配置]
      summary: 创建渠道配置
      requestBody:
        description: 渠道配置请求
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreConfigRequest'
      responses:
        '200':
          description: 创建成功并返回渠道配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStoreConfigResponse'
  /api/store-configs/{configId}:
    get:
      tags: [渠道配置]
      summary: 查询渠道配置详情
      parameters:
        - $ref: '#/components/parameters/ConfigId'
      responses:
        '200':
          description: 查询成功并返回渠道配置详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStoreConfigResponse'
    put:
      tags: [渠道配置]
      summary: 更新渠道配置
      parameters:
        - $ref: '#/components/parameters/ConfigId'
      requestBody:
        description: 渠道配置请求
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreConfigRequest'
      responses:
        '200':
          description: 更新成功并返回最新渠道配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStoreConfigResponse'
    delete:
      tags: [渠道配置]
      summary: 删除渠道配置
      parameters:
        - $ref: '#/components/parameters/ConfigId'
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
  /api/store-configs/{configId}/status:
    put:
      tags: [渠道配置]
      summary: 更新渠道配置状态
      parameters:
        - $ref: '#/components/parameters/ConfigId'
        - in: query
          name: apiStatus
          required: true
          description: API 状态：1=启用，0=禁用
          schema:
            type: integer
            enum: [0, 1]
      responses:
        '200':
          description: 更新成功并返回最新渠道配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStoreConfigResponse'
  /api/apps/{appId}/versions:
    get:
      tags: [安装包管理]
      summary: 查询版本列表
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: 查询成功并返回版本列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppVersionResponseList'
  /api/apps/{appId}/versions/{versionId}:
    get:
      tags: [安装包管理]
      summary: 查询版本详情
      parameters:
        - $ref: '#/components/parameters/AppId'
        - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: 查询成功并返回版本详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppVersionResponse'
  /api/apps/{appId}/versions/upload:
    post:
      tags: [安装包管理]
      summary: 上传安装包
      parameters:
        - $ref: '#/components/parameters/AppId'
      requestBody:
        description: 安装包上传表单
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 安装包文件
                updateLog:
                  type: string
                  description: 版本更新说明
                expectedVersionName:
                  type: string
                  description: 期望版本名称，用于上传后校验
                expectedVersionCode:
                  type: integer
                  description: 期望版本号，用于上传后校验
                expectedReinforced:
                  type: boolean
                  description: 是否期望为加固包，用于上传后校验
      responses:
        '200':
          description: 上传成功并返回解析后的版本信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePackageUploadResponse'
  /api/releases:
    get:
      tags: [发版管理]
      summary: 查询发版记录
      parameters:
        - in: query
          name: current
          description: 当前页，兼容 pageNum
          schema:
            type: integer
            format: int64
        - in: query
          name: size
          description: 每页大小，兼容 pageSize
          schema:
            type: integer
            format: int64
        - in: query
          name: pageNum
          description: 当前页别名，未传 current 时生效
          schema:
            type: integer
            format: int64
        - in: query
          name: pageSize
          description: 每页大小别名，未传 size 时生效
          schema:
            type: integer
            format: int64
        - in: query
          name: key
          description: 按渠道类型、应用名称、包名、应用描述或版本号进行模糊匹配
          schema:
            type: string
      responses:
        '200':
          description: 查询成功并返回发版记录分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePageResponseReleaseRecordPageResponse'
  /api/releases/appId/{appId}:
    get:
      tags: [发版管理]
      summary: 根据应用 ID 查询发版记录
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: 查询成功并返回该应用的发版记录分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePageResponseReleaseRecordPageResponse'
  /api/releases/submit:
    post:
      tags: [发版管理]
      summary: 提交发版
      requestBody:
        description: 发版提交请求
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseSubmitRequest'
      responses:
        '200':
          description: 提交成功并返回发版记录列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseReleaseRecordResponseList'
  /api/releases/{releaseId}:
    get:
      tags: [发版管理]
      summary: 查询发版详情
      parameters:
        - $ref: '#/components/parameters/ReleaseId'
      responses:
        '200':
          description: 查询成功并返回发版详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseReleaseRecordResponse'
  /api/releases/{releaseId}/logs:
    get:
      tags: [发版管理]
      summary: 查询发版日志
      parameters:
        - $ref: '#/components/parameters/ReleaseId'
      responses:
        '200':
          description: 查询成功并返回发版日志列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseReleaseTaskLogResponseList'
  /api/cicd/releases/trigger:
    post:
      tags: [CI/CD]
      summary: 触发 CI/CD 发布
      requestBody:
        description: CI/CD 发布触发表单
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [appId, storeTypes, file]
              properties:
                appId:
                  type: integer
                  format: int64
                  description: 应用 ID
                storeTypes:
                  type: string
                  description: 渠道类型列表，多个值用英文逗号分隔，例如 vivo,xiaomi
                file:
                  type: string
                  format: binary
                  description: 安装包文件
                updateLog:
                  type: string
                  description: 版本更新说明
                expectedVersionName:
                  type: string
                  description: 期望版本名称，用于上传后校验
                expectedVersionCode:
                  type: integer
                  description: 期望版本号，用于上传后校验
                expectedReinforced:
                  type: boolean
                  description: 是否期望为加固包，用于上传后校验
      responses:
        '200':
          description: 触发成功并返回发版记录列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseReleaseRecordResponseList'
components:
  parameters:
    AppId:
      in: path
      name: appId
      description: 应用 ID
      required: true
      schema:
        type: integer
        format: int64
    ConfigId:
      in: path
      name: configId
      description: 渠道配置 ID
      required: true
      schema:
        type: integer
        format: int64
    VersionId:
      in: path
      name: versionId
      description: 版本 ID
      required: true
      schema:
        type: integer
        format: int64
    ReleaseId:
      in: path
      name: releaseId
      description: 发版记录 ID
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    AppUpsertRequest:
      type: object
      description: 应用新增或更新请求
      required: [appName, packageName, appType]
      properties:
        id:
          type: integer
          format: int64
          description: 用于更新请求的应用 ID
        appName:
          type: string
          description: 应用名称
        packageName:
          type: string
          description: 包名
        appType:
          type: integer
          enum: [1, 2]
          description: 应用类型，1=Android 应用，2=iOS 应用
        appDescription:
          type: string
          description: 应用描述
        copyrightNo:
          type: string
          description: 软件著作权登记号
        icpNo:
          type: string
          description: ICP 备案号
        appRecordNo:
          type: string
          description: 应用备案号
        privacyUrl:
          type: string
          description: 隐私政策地址
        userAgreementUrl:
          type: string
          description: 用户协议地址
        status:
          type: integer
          enum: [0, 1]
          description: 状态：1=启用，0=禁用
        versionCode:
          type: integer
          description: 版本号编码，创建应用时传入会自动初始化一条版本记录
        buildCode:
          type: string
          description: 构建号，创建应用时可用于初始化版本记录
    StoreConfigRequest:
      type: object
      description: 渠道配置请求
      required: [storeType]
      properties:
        id:
          type: integer
          format: int64
          description: 用于更新请求的渠道配置 ID
        storeType:
          type: string
          description: 应用市场名称，例如 vivo 或 xiaomi
        accountName:
          type: string
          description: 开发者账号名称
        email:
          type: string
          description: 联系邮箱
        phone:
          type: string
          description: 联系电话
        clientId:
          type: string
          description: 开放平台 Client ID
        clientSecret:
          type: string
          description: 开放平台 Client Secret
        miPublicKey:
          type: string
          description: 小米公钥
        miPrivateKey:
          type: string
          description: 小米私钥
        token:
          type: string
          description: 固定 Token
        ipWhitelist:
          type: string
          description: IP 白名单
        apiStatus:
          type: integer
          enum: [0, 1]
          description: API 状态：1=启用，0=禁用
    ReleaseSubmitRequest:
      type: object
      description: 发版提交请求
      required: [versionId, storeTypes]
      properties:
        versionId:
          type: integer
          format: int64
          description: 版本 ID
        storeTypes:
          type: array
          description: 发布渠道列表，例如 vivo、xiaomi
          items:
            type: string
        releaseMode:
          type: string
          default: api
          enum: [manual, api]
          description: 发布模式，默认 api
        releaseType:
          type: integer
          format: int64
          default: 1
          description: 发布类型：1=全量发布，2=分阶段发布
        grayPercent:
          type: integer
          format: int64
          description: 灰度比例，仅分阶段发布时生效，releaseType=2 时必填
        grayStartTime:
          type: string
          format: date-time
          description: 灰度开始时间，仅分阶段发布时生效，releaseType=2 时必填
        grayEndTime:
          type: string
          format: date-time
          description: 灰度结束时间，仅分阶段发布时生效，releaseType=2 时必填
    AppResponse:
      type: object
      description: 应用响应
      properties:
        id:
          type: integer
          format: int64
          description: 应用 ID
        appName:
          type: string
          description: 应用名称
        packageName:
          type: string
          description: 包名
        appType:
          type: integer
          description: 应用类型，1=Android 应用，2=iOS 应用
        appDescription:
          type: string
          description: 应用描述
        copyrightNo:
          type: string
          description: 软件著作权登记号
        icpNo:
          type: string
          description: ICP 备案号
        appRecordNo:
          type: string
          description: 应用备案号
        privacyUrl:
          type: string
          description: 隐私政策地址
        userAgreementUrl:
          type: string
          description: 用户协议地址
        status:
          type: integer
          description: 状态：1=启用，0=禁用
        createUser:
          type: string
          description: 创建人
        updateUser:
          type: string
          description: 更新人
        createTime:
          type: string
          format: date-time
          description: 创建时间
        updateTime:
          type: string
          format: date-time
          description: 更新时间
    AppDetailResponse:
      type: object
      description: 应用详情响应
      properties:
        id:
          type: integer
          format: int64
          description: 应用 ID
        appName:
          type: string
          description: 应用名称
        packageName:
          type: string
          description: 包名
        appType:
          type: integer
          description: 应用类型，1=Android 应用，2=iOS 应用
        appDescription:
          type: string
          description: 应用描述
        copyrightNo:
          type: string
          description: 软件著作权登记号
        icpNo:
          type: string
          description: ICP 备案号
        appRecordNo:
          type: string
          description: 应用备案号
        privacyUrl:
          type: string
          description: 隐私政策地址
        userAgreementUrl:
          type: string
          description: 用户协议地址
        status:
          type: integer
          description: 状态：1=启用，0=禁用
        createUser:
          type: string
          description: 创建人
        updateUser:
          type: string
          description: 更新人
        createTime:
          type: string
          format: date-time
          description: 创建时间
        updateTime:
          type: string
          format: date-time
          description: 更新时间
        versions:
          type: array
          description: 关联版本列表
          items:
            $ref: '#/components/schemas/AppVersionResponse'
        releaseRecords:
          type: array
          description: 关联发版记录列表
          items:
            $ref: '#/components/schemas/ReleaseRecordResponse'
    StoreConfigResponse:
      type: object
      description: 应用市场账户配置响应
      properties:
        id:
          type: integer
          format: int64
          description: 应用市场账户 ID
        storeType:
          type: string
          description: 应用市场名称
        accountName:
          type: string
          description: 开发者账号名称
        email:
          type: string
          description: 联系邮箱
        phone:
          type: string
          description: 联系电话
        clientId:
          type: string
          description: 开放平台 Client ID
        clientSecret:
          type: string
          description: 开放平台 Client Secret
        miPublicKey:
          type: string
          description: 小米公钥
        miPrivateKey:
          type: string
          description: 小米私钥
        token:
          type: string
          description: 固定 Token
        ipWhitelist:
          type: string
          description: IP 白名单
        apiStatus:
          type: integer
          description: API 状态：1=启用，0=禁用
        createUser:
          type: string
          description: 创建人
        updateUser:
          type: string
          description: 更新人
        createTime:
          type: string
          format: date-time
          description: 创建时间
        updateTime:
          type: string
          format: date-time
          description: 更新时间
    PageResponseStoreConfigResponse:
      type: object
      description: 渠道配置分页响应
      properties:
        current:
          type: integer
          format: int64
          description: 当前页
        size:
          type: integer
          format: int64
          description: 每页大小
        total:
          type: integer
          format: int64
          description: 总记录数
        pages:
          type: integer
          format: int64
          description: 总页数
        records:
          type: array
          description: 分页数据
          items:
            $ref: '#/components/schemas/StoreConfigResponse'
    AppVersionResponse:
      type: object
      description: 应用版本响应
      properties:
        id:
          type: integer
          format: int64
          description: 版本 ID
        appId:
          type: integer
          format: int64
          description: 应用 ID
        versionName:
          type: string
          description: 版本名称
        versionCode:
          type: integer
          description: 版本号
        buildCode:
          type: string
          description: 构建号
        packageUrl:
          type: string
          description: 主安装包访问地址
        packageUrlLow:
          type: string
          description: 32 位安装包访问地址
        packageUrlHigh:
          type: string
          description: 64 位安装包访问地址
        updateLog:
          type: string
          description: 更新说明
        reinforced:
          type: boolean
          description: 是否为加固包
        createUser:
          type: string
          description: 创建人
        updateUser:
          type: string
          description: 更新人
        createTime:
          type: string
          format: date-time
          description: 创建时间
    PackageUploadResponse:
      type: object
      description: 安装包上传响应
      properties:
        versionId:
          type: integer
          format: int64
          description: 版本 ID
        appId:
          type: integer
          format: int64
          description: 应用 ID
        packageType:
          type: string
          description: 安装包类型
        storedPath:
          type: string
          description: 文件存储路径
        versionName:
          type: string
          description: 版本名称
        versionCode:
          type: integer
          description: 版本号
        reinforced:
          type: boolean
          description: 是否为加固包
        checksum:
          type: string
          description: 文件校验值
        createTime:
          type: string
          format: date-time
          description: 上传时间
    ReleaseRecordResponse:
      type: object
      description: 发版记录响应
      properties:
        id:
          type: integer
          format: int64
          description: 发版记录 ID
        appId:
          type: integer
          format: int64
          description: 应用 ID
        appName:
          type: string
          description: 应用名称
        packageName:
          type: string
          description: 包名
        appDescription:
          type: string
          description: 应用描述
        versionId:
          type: integer
          format: int64
          description: 版本 ID
        versionCode:
          type: integer
          description: 版本号
        storeType:
          type: string
          description: 商店类型
        releaseMode:
          type: string
          description: 发布方式
        releaseType:
          type: integer
          format: int64
